<html lang="EN-us"><head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <script>
      performance.now = Date.now;
    </script>

    <style>

      body {
        font-family: arial;
        margin: 0;
        padding: none;
        background-color: rgb(0, 0, 0);
        overflow: hidden;
      }
      #header {
        width: 100%;
        height: 80px;
        background-color: #888888;
      }
      #logo {
        width:64px;
        height:64px;
        float:left;
        position:relative;
        margin:10px;
      }
      div.emscripten { text-align: center; }
      div.emscripten_border { min-height: 100vh; display: flex; justify-content: center; align-items: center; }
      canvas.emscripten {
        border: 0px none;
        width: 100%;
      }
      .spinner {
        height: 30px;
        width: 30px;
        margin: 0;
        margin-top: 20px;
        margin-left: 20px;
        display: inline-block;
        vertical-align: top;
        -webkit-animation: rotation .8s linear infinite;
        -moz-animation: rotation .8s linear infinite;
        -o-animation: rotation .8s linear infinite;
        animation: rotation 0.8s linear infinite;
        border-left: 5px solid black;
        border-right: 5px solid black;
        border-bottom: 5px solid black;
        border-top: 5px solid red;
        border-radius: 100%;
        background-color: rgb(245, 245, 245);
      }
      @-webkit-keyframes rotation {
        from {-webkit-transform: rotate(0deg);}
        to {-webkit-transform: rotate(360deg);}
      }
      @-moz-keyframes rotation {
        from {-moz-transform: rotate(0deg);}
        to {-moz-transform: rotate(360deg);}
      }
      @-o-keyframes rotation {
        from {-o-transform: rotate(0deg);}
        to {-o-transform: rotate(360deg);}
      }
      @keyframes rotation {
        from {transform: rotate(0deg);}
        to {transform: rotate(360deg);}
      }

      #status {
        display: inline-block;
        vertical-align: top;
        margin-top: 30px;
        margin-left: 20px;
        font-weight: bold;
        color: rgb(40, 40, 40);
      }

      #progress {
        height: 0px;
        width: 0px;
      }

      #controls {
        display: inline-block;
        float: right;
        vertical-align: top;
        margin-top: 15px;
        margin-right: 20px;
      }

      #output {
        border-left: 0px none;
        border-right: 0px none;
        border-bottom: 0px none;
        padding-left: 0;
        padding-right: 0;
        width: 100%;
        height: 140px;
        margin: 0 auto;
        margin-top: 10px;
        display: block;
        background-color: black;
        color: rgb(37, 174, 38);
        font-family: 'Lucida Console', Monaco, monospace;
        outline: none;
      }

      input[type=button] {
        background-color: lightgray;
        border: 4px solid darkgray;
        color: black;
        text-decoration: none;
        cursor: pointer;
        width: 140px;
        height: 50px;
        margin-left: 10px;
      }

      input[type=button]:hover {
        background-color: #f5f5f5ff;
        border-color: black;
      }
    
    </style>
  </head>
  <body oncontextmenu="event.preventDefault()">
    <div id="header" style="display: none;">
        <a id="logo" href="https://www.raylib.com"></a>

        <div class="spinner" id="spinner" style="display: none;"></div>
        <div class="emscripten" id="status"></div>

        <span id="controls">
          <span><input type="button" value="📜 SOURCE CODE" onclick="location.href='https://github.com/raysan5/raylib';"></span>
          <span><input type="button" value="🖵 FULLSCREEN" onclick="Module.requestFullscreen(false, false)"></span>
          <span><input type="button" id="btn-audio" value="🔇 MUTE" onclick="toggleAudio()"></span>
        </span>

        <div class="emscripten">
          <progress value="0" max="62087600" id="progress" hidden=""></progress>
        </div>
    </div>

    <script>
      var Module;
      function resizeCanvas(el) {
        el.width = window.innerWidth;
        el.height = window.innerHeight;
      }
    </script>

    <div class="emscripten_border">
      <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1" onresize="resizeCanvas(this);" width="1920" height="955"></canvas>
    </div>

    <textarea id="output" rows="8" style="display: none;"></textarea>

    <!-- REF: https://developers.google.com/web/updates/2018/11/web-audio-autoplay -->
    <script type="text/javascript">
        var audioBtn = document.querySelector('#btn-audio');

        // An array of all contexts to resume on the page
        const audioContexList = [];
        (function() {
            // A proxy object to intercept AudioContexts and
            // add them to the array for tracking and resuming later
            self.AudioContext = new Proxy(self.AudioContext, {
                construct(target, args) {
                    const result = new target(...args);
                    audioContexList.push(result);
                    if (result.state == "suspended") audioBtn.value = "🔈 RESUME";
                    return result;
                }
            });
        })();

        function toggleAudio() {
            var resumed = false;
            audioContexList.forEach(ctx => {
                if (ctx.state == "suspended") { ctx.resume(); resumed = true; }
                else if (ctx.state == "running") ctx.suspend();
            });

            if (resumed) audioBtn.value = "🔇 MUTE";
            else audioBtn.value = "🔈 RESUME";
        }
    </script>
    <script type="module" src="main.js"></script>

</body></html>
